# docker-compose.test.yml

services:
  test-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_recipes
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_recipes"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: "test_access_key"
      MINIO_ROOT_PASSWORD: "test_secret_key_123"
    ports:
      - "9000:9000"
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Создаёт бакет "recipes" в MinIO после его запуска
  test-minio-init:
    image: minio/mc:latest
    depends_on:
      test-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://test-minio:9000 test_access_key test_secret_key_123;
      mc mb --ignore-existing local/recipes;
      mc anonymous set download local/recipes;
      echo 'Bucket recipes created and configured';
      "